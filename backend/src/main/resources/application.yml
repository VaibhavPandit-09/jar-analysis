spring:
  application:
    name: jarscan
  datasource:
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
    url: jdbc:sqlite:${jarscan.db-path}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${JARSCAN_MAX_UPLOAD_SIZE:500MB}
      max-request-size: ${JARSCAN_MAX_UPLOAD_SIZE:500MB}
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  shutdown: graceful

jarscan:
  app-version: ${JARSCAN_APP_VERSION:0.1.0-SNAPSHOT}
  data-dir: ${JARSCAN_DATA_DIR:/app/data}
  db-path: ${JARSCAN_DB_PATH:${JARSCAN_DATA_DIR:/app/data}/jarscan.db}
  dependency-check-command: ${JARSCAN_DEPENDENCY_CHECK_COMMAND:dependency-check.sh}
  max-nested-jar-depth: ${JARSCAN_MAX_NESTED_JAR_DEPTH:4}
  max-extracted-archive-size-bytes: ${JARSCAN_MAX_EXTRACTED_ARCHIVE_SIZE_BYTES:268435456}
  max-duplicate-class-scan-jars: ${JARSCAN_MAX_DUPLICATE_CLASS_SCAN_JARS:250}
  project-zip-max-files: ${JARSCAN_PROJECT_ZIP_MAX_FILES:20000}
  project-zip-max-extracted-size-bytes: ${JARSCAN_PROJECT_ZIP_MAX_EXTRACTED_SIZE_BYTES:536870912}
  maven-timeout-seconds: ${JARSCAN_MAVEN_TIMEOUT_SECONDS:600}
  maven-dependency-scope: ${JARSCAN_MAVEN_DEPENDENCY_SCOPE:runtime}
